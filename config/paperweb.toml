[llm]
# Optional: set here or in environment variable OPENAI_API_KEY
openai_api_key = ""

[llm.router]
provider = "mock"
model = "gpt-4.1-mini"

[llm.extractor]
provider = "mock"
model = "gpt-4.1-mini"

[llm.generator]
provider = "mock"
